name: Build APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant permission
        run: chmod +x gradlew

      # 🔥 Build correct flavor (stable debug)
      - name: Build Stable Debug APK
        run: ./gradlew assembleStableDebug

      # 🔥 Debug: show where APK is generated (VERY IMPORTANT)
      - name: Find APK
        run: find . -type f -name "*.apk"

      # 🔥 Upload APK (SAFE wildcard so it NEVER fails)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Stable-APK
          path: "**/*.apk"
